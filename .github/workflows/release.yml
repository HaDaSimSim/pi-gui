name: release

# Build the macOS universal .dmg and attach it to a GitHub Release.
# Triggers on a pushed v* tag (e.g. v1.0.2), or manually via the Actions tab.
#
# Public repo -> macOS runners are free. The job mirrors the local `tauri:build`
# script: fetch+lipo a universal node sidecar, bundle the Node backend, build the
# universal Tauri app, rename the dmg, then publish it to the release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v1.0.2)"
        required: true

permissions:
  contents: write # create/update releases + upload assets

jobs:
  macos-universal:
    runs-on: macos-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # vendor/pi-skills is a submodule; shared/session-lock.ts symlinks into
          # it, so the backend bundle dangles without a recursive checkout.
          submodules: recursive
          # workflow_dispatch passes a tag; the push event already checks it out.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (typecheck + unit tests)
        run: |
          pnpm typecheck
          pnpm test:unit

      # tauri:build = fetch:node (lipo universal node) + bundle:backend +
      # tauri build --target universal-apple-darwin + finalize (dmg rename).
      # No signing identity in CI -> ad-hoc signed (matches the local release).
      - name: Build universal app + dmg
        run: pnpm tauri:build

      - name: Locate dmg
        id: dmg
        run: |
          dmg=$(find src-tauri/target -path '*bundle/dmg/*.dmg' | head -n1)
          if [ -z "$dmg" ]; then
            echo "No dmg produced" >&2
            exit 1
          fi
          echo "path=$dmg" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg")" >> "$GITHUB_OUTPUT"
          echo "Found $dmg"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: pi-gui ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ steps.dmg.outputs.path }}
          fail_on_unmatched_files: true
