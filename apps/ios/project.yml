name: PiGui
options:
  bundleIdPrefix: me.mingeon.pigui
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad

targets:
  PiGui:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: pi
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Camera is used to scan the pairing QR code.
        NSCameraUsageDescription: pi uses the camera to scan the pairing QR code shown by pi-gui on your Mac.
        # App Transport Security: the backend is reached over Tailscale HTTPS
        # (*.ts.net, a trusted cert) so no ATS exception is needed for the happy
        # path. We allow local networking for the optional plain-LAN fallback.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: pi connects to the pi-gui backend running on your computer over your local network or Tailscale.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.mingeon.pigui
        GENERATE_INFOPLIST_FILE: NO
