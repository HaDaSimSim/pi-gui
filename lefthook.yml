# lefthook — code-quality gates (Swift-native app).
# pre-commit formats staged Swift sources with the toolchain's `swift format`.
# pre-push runs a full Swift build. commit-msg enforces Conventional Commits v1.0.0.
#
# Install: `lefthook install`
# Bypass (emergency): git commit --no-verify

pre-commit:
  parallel: true
  commands:
    swift-format:
      glob: "Sources/**/*.swift"
      run: swift format --in-place {staged_files}
      stage_fixed: true

pre-push:
  commands:
    build:
      run: swift build

commit-msg:
  commands:
    conventional:
      run: |
        head -1 "{1}" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+' \
          || { echo 'commit message must follow Conventional Commits (e.g. "feat(swift): ...")'; exit 1; }
